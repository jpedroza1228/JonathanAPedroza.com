name: Notify readme of new post
on:
  push:
    branches:
      - main

jobs:
  update-posts:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout website repo
        uses: actions/checkout@v6.0.2
        with:
          path: _site

      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          repository: jpedroza1228/jpedroza1228
          # path: profile
          token: ${{ secrets.PROFILE_TOKEN}}

      - name: Get the latest post and put it on my profile readme
        shell: bash
        run: |
          uv pip install -r pyproject.toml
          python3 ./.github/scripts/latest_post.py

      - name: Commit and push changes (if any)
        shell: bash
        env:
          CI_COMMIT_MESSAGE: update profile readme with latest posts
          CI_COMMIT_AUTHOR: github-actions[bot]
          CI_COMMIT_EMAIL: username@users.noreply.github.com
        run: |
          cd profile
          git config --global user.name "${{ env.CI_COMMIT_AUTHOR }}"
          git config --global user.email "${{ env.CI_COMMIT_EMAIL }}"
          if [[ `git status --porcelain --untracked-files=no` ]]; then
            # Changes
            git add README.md
            git commit -m "${{ env.CI_COMMIT_MESSAGE }}"
            git push
          else
            # No changes
            echo "no changes to latest posts"
            exit 0
          fi